services:
  - type: web
    name: store-ratings-app
    env: node
    plan: free
    buildCommand: |
      npm install
      npm install --prefix frontend
      npm install --prefix backend
      npm run build --prefix frontend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: store-ratings-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://store-ratings-app.onrender.com

databases:
  - name: store-ratings-db
    engine: postgresql
    plan: free
    databaseName: store_ratings
    preEnvVars:
      - name: DATABASE_URL
        valuePrefix: postgresql://
